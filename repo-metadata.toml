# Single source of truth for repo-level identity (org slug, maintainer email,
# canonical URLs). Mirrors the convention used in the main `wickra` repository.

[repo]
org          = "wickra-lib"
name         = "wickra-playground"
url          = "https://github.com/wickra-lib/wickra-playground"
homepage     = "https://wickra.org"
issues_url   = "https://github.com/wickra-lib/wickra-playground/issues"
security_url = "https://github.com/wickra-lib/wickra-playground/security/advisories/new"

[maintainer]
# `handle` is the natural-person credit shown in package manifests; it does not
# move with a GitHub org transfer. `github` is the org @-mention slug used in
# CODEOWNERS and prose.
handle = "kingchenc"
email  = "support@wickra.org"
github = "wickra-lib"

[badges]
ci_workflow = "ci.yml"

[audit]
# Forbidden substrings that must not appear in source (the pre-org-migration
# repo path). Kept in lock-step with the main repository's convention.
forbidden = [
    "kingchenc/wickra-playground",
]

# Paths exempt from the forbidden-substring scan: dependencies, build output,
# the lockfile, and this file (which legitimately spells the forbidden value
# out — it defines it).
allowlist = [
    "node_modules/",
    "dist/",
    "package-lock.json",
    "repo-metadata.toml",
]
